<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MTCPL Stone Management System</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Georgia, "Times New Roman", serif;
      background:
        radial-gradient(circle at top left, rgba(200, 170, 120, 0.15), transparent 30%),
        linear-gradient(180deg, #f6f0e5 0%, #efe4d1 55%, #e4d5be 100%);
      color: #2b231a;
      min-height: 100vh;
    }
    header {
      background: linear-gradient(90deg, #2f2418 0%, #5b4126 60%, #8d6a40 100%);
      color: #fff7ec;
      padding: 16px 22px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.14);
      position: sticky;
      top: 0;
      z-index: 5;
      box-shadow: 0 10px 30px rgba(43, 35, 26, 0.15);
    }
    .head-row {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .brand {
      width: 50px;
      height: 50px;
      border-radius: 14px;
      background: linear-gradient(180deg, #f7e7ca 0%, #d7b985 100%);
      color: #3d2a14;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      letter-spacing: 0.08em;
      box-shadow: inset 0 0 0 1px rgba(61, 42, 20, 0.14);
    }
    .head-copy h1 {
      font-size: 21px;
      letter-spacing: 0.02em;
    }
    .head-copy p {
      font-size: 12px;
      color: #f3dcc2;
      margin-top: 4px;
    }
    .head-meta {
      margin-left: auto;
      font-size: 12px;
      color: #f3dcc2;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
    }
    main {
      max-width: 1320px;
      margin: 0 auto;
      padding: 20px 16px 28px;
    }
    .toolbar, .card, .metric, .surface, .login-shell {
      background: rgba(255, 249, 241, 0.92);
      border: 1px solid rgba(110, 79, 41, 0.14);
      box-shadow: 0 10px 24px rgba(72, 53, 31, 0.08);
      border-radius: 18px;
    }
    .toolbar {
      padding: 12px;
      margin-bottom: 16px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .tab-btn, .btn, .ghost-btn {
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-family: inherit;
      transition: transform 0.14s ease, opacity 0.14s ease, box-shadow 0.14s ease;
    }
    .tab-btn:hover, .btn:hover, .ghost-btn:hover {
      transform: translateY(-1px);
    }
    .tab-btn {
      background: transparent;
      color: #6a5743;
      padding: 10px 14px;
      font-size: 12px;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .tab-btn.active {
      background: linear-gradient(180deg, #5d4326 0%, #7c5c35 100%);
      color: #fff8ee;
      box-shadow: 0 10px 20px rgba(93, 67, 38, 0.2);
    }
    .tab-btn:disabled {
      opacity: 0.38;
      cursor: not-allowed;
      transform: none;
    }
    .badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.04em;
      border-radius: 999px;
      padding: 3px 8px;
      white-space: nowrap;
    }
    .b-blue { background: #d7e8f7; color: #285a84; }
    .b-orange { background: #f5dfca; color: #8b4f16; }
    .b-green { background: #d9ecd9; color: #2d6634; }
    .b-red { background: #f5d7d6; color: #8e2d2f; }
    .b-yellow { background: #f6edc7; color: #846600; }
    .b-stone { background: #eee3d0; color: #6c5337; }
    .page-title {
      font-size: 20px;
      margin-bottom: 12px;
      color: #402e1b;
    }
    .muted {
      color: #7d6a55;
      font-size: 12px;
    }
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .grid-4 {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }
    .grid-auto {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 14px;
    }
    .card {
      padding: 16px;
      margin-bottom: 12px;
    }
    .surface {
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 14px;
      background: rgba(255, 251, 246, 0.98);
    }
    .metric {
      padding: 15px;
    }
    .metric-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #7d6a55;
      margin-bottom: 6px;
      font-weight: 700;
    }
    .metric-value {
      font-size: 26px;
      font-weight: 700;
      color: #3f2d1a;
    }
    .metric-sub {
      font-size: 11px;
      margin-top: 6px;
      color: #8a7965;
    }
    .row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .between {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }
    .section-head {
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    input, select, textarea {
      width: 100%;
      padding: 9px 10px;
      border-radius: 12px;
      border: 1px solid #d8c8b1;
      background: #fffdf8;
      color: #2b231a;
      font-family: inherit;
      font-size: 12px;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #8b6a43;
      box-shadow: 0 0 0 3px rgba(139, 106, 67, 0.12);
    }
    textarea {
      min-height: 72px;
      resize: vertical;
    }
    .field {
      min-width: 56px;
      flex: 1 1 56px;
    }
    .field-label {
      display: block;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #8a7965;
      margin-bottom: 4px;
      font-weight: 700;
    }
    .btn {
      padding: 10px 16px;
      font-size: 12px;
      font-weight: 700;
    }
    .btn-primary {
      background: linear-gradient(180deg, #3e6a33 0%, #2d5725 100%);
      color: #f8fff5;
    }
    .btn-danger {
      background: linear-gradient(180deg, #973b36 0%, #7a2723 100%);
      color: #fff4f2;
    }
    .btn-dark {
      background: linear-gradient(180deg, #5c4225 0%, #3e2d18 100%);
      color: #fff6ea;
    }
    .btn-light {
      background: linear-gradient(180deg, #f6efe2 0%, #eadcc6 100%);
      color: #5f472e;
      border: 1px solid #dbc7ab;
    }
    .ghost-btn {
      background: transparent;
      color: #8b6a43;
      padding: 6px 8px;
      font-size: 12px;
      font-weight: 700;
    }
    .chip {
      display: inline-block;
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 10px;
      font-weight: 700;
      margin: 2px 4px 2px 0;
      border: 1px solid rgba(0, 0, 0, 0.08);
    }
    .banner {
      padding: 12px 14px;
      border-radius: 14px;
      margin-bottom: 16px;
      font-size: 12px;
      border: 1px solid;
    }
    .banner-info {
      background: #eef5fb;
      border-color: #c7dcef;
      color: #2a628a;
    }
    .banner-warn {
      background: #fff5e3;
      border-color: #f0d297;
      color: #8b5b06;
    }
    .banner-ok {
      background: #edf7ed;
      border-color: #cbe1cb;
      color: #356c39;
    }
    .empty {
      padding: 40px 20px;
      text-align: center;
      color: #8b7b68;
    }
    .small {
      font-size: 11px;
    }
    .table {
      width: 100%;
      border-collapse: collapse;
    }
    .table th, .table td {
      text-align: left;
      padding: 10px 8px;
      border-bottom: 1px solid #eadfce;
      font-size: 12px;
    }
    .table th {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #7d6a55;
    }
    .login-wrap {
      min-height: calc(100vh - 110px);
      display: grid;
      place-items: center;
    }
    .login-shell {
      width: min(720px, 100%);
      padding: 28px;
      overflow: hidden;
      position: relative;
    }
    .login-shell:before {
      content: "";
      position: absolute;
      inset: -10% -10% auto auto;
      width: 240px;
      height: 240px;
      background: radial-gradient(circle, rgba(176, 134, 74, 0.18), transparent 70%);
      pointer-events: none;
    }
    .portal-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 12px;
      margin-top: 18px;
    }
    .portal-card {
      padding: 14px;
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(255, 252, 247, 1) 0%, rgba(245, 235, 220, 0.95) 100%);
      border: 1px solid rgba(119, 86, 48, 0.15);
      cursor: pointer;
      text-align: left;
      min-height: 120px;
    }
    .portal-card.active {
      border-color: #7b5a34;
      box-shadow: inset 0 0 0 1px rgba(123, 90, 52, 0.2), 0 10px 24px rgba(72, 53, 31, 0.08);
    }
    .portal-card strong {
      display: block;
      margin-bottom: 6px;
      color: #3f2d1a;
    }
    .portal-card span {
      font-size: 12px;
      color: #796854;
      line-height: 1.5;
    }
    .role-strip {
      margin-left: auto;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .pill {
      border-radius: 999px;
      padding: 6px 10px;
      background: rgba(255, 247, 235, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.18);
      font-size: 11px;
    }
    .split-actions {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 18px;
    }
    .print-hide {}
    @media (max-width: 980px) {
      .grid-2, .grid-4 {
        grid-template-columns: 1fr;
      }
      .head-meta {
        margin-left: 0;
        justify-content: flex-start;
      }
    }
    @media print {
      header, .toolbar, .print-hide {
        display: none !important;
      }
      body {
        background: #fff;
      }
      .card, .surface, .metric {
        box-shadow: none;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="head-row">
      <div class="brand">MC</div>
      <div class="head-copy">
        <h1>MTCPL Stone Management System</h1>
        <p>Offline single-file build for browser use with localStorage persistence</p>
      </div>
      <div class="head-meta" id="head-meta"></div>
    </div>
  </header>
  <main>
    <div id="app"></div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script>
    var R = React;
    var h = R.createElement;
    var useState = R.useState;
    var useEffect = R.useEffect;

    var STORAGE_VERSION = 2;
    var STONE_TYPES = ["Makrana", "Pinkstone"];
    var TEMPLES = ["Umia Mata", "Agroha Dham", "Balaknath", "Shrinathji", "Other"];
    var YARDS = [1, 2, 3];
    var DEFAULT_COLOR = "#7b684f";
    var STONE_PALETTES = {
      Makrana: { top: "#EEE8DC", front: "#C8BFB0", side: "#D8D0BE" },
      Pinkstone: { top: "#EDCFC2", front: "#C09282", side: "#D8B4A2" }
    };
    var SLAB_COLORS = ["#D85A30", "#378ADD", "#1D9E75", "#7F77DD", "#BA7517", "#639922", "#D4537E", "#E24B4A", "#5F5E5A", "#0F6E56"];

    var INHOUSE = [
      { id: "mohit", name: "Mohit", type: "CNC", portal: "vendor_mohit" },
      { id: "manthan", name: "Manthan", type: "CNC", portal: "vendor_manthan" },
      { id: "alkesh", name: "Alkesh", type: "CNC", portal: "vendor_alkesh" },
      { id: "dinesh_d", name: "Dinesh Dholi", type: "Manual", portal: "vendor_dinesh_d" }
    ];
    var OUTSIDE = [
      { id: "pintu", name: "Pintu Bhai", type: "Manual", portal: "vendor_pintu" },
      { id: "ramesh", name: "Ramesh Ji", type: "Manual", portal: "vendor_ramesh" },
      { id: "bharat", name: "Bharat", type: "Manual", portal: "vendor_bharat" },
      { id: "dinesh_j", name: "Dinesh Ji", type: "Manual", portal: "vendor_dinesh_j" }
    ];
    var ALL_VENDORS = INHOUSE.concat(OUTSIDE);

    var PORTALS = [
      { id: "owner", label: "Owner", desc: "Full dashboard, planning, approvals, dispatch log", tabs: ["inventory", "plan", "cutting", "carving_assign", "carving", "dashboard"] },
      { id: "planner", label: "Planner", desc: "Maintain blocks and slabs, generate cut plans", tabs: ["inventory", "plan"] },
      { id: "block_entry", label: "Block Entry", desc: "Add and update stock blocks only", tabs: ["inventory"] },
      { id: "slab_entry", label: "Slab Entry", desc: "Add and update slab requirements only", tabs: ["inventory"] },
      { id: "worker", label: "Cutting Worker", desc: "Approve, reject, cut, restock and print sessions", tabs: ["cutting"] },
      { id: "carving_assigner", label: "Carving Assign", desc: "Assign slabs to in-house or outside vendors", tabs: ["carving_assign"] },
      { id: "dispatch", label: "Dispatch Desk", desc: "See carving progress and dispatch completed slabs", tabs: ["carving", "dashboard"] }
    ];

    function getPortalDef(id) {
      var i;
      for (i = 0; i < PORTALS.length; i++) {
        if (PORTALS[i].id === id) return PORTALS[i];
      }
      for (i = 0; i < ALL_VENDORS.length; i++) {
        if (ALL_VENDORS[i].portal === id) {
          return {
            id: id,
            label: ALL_VENDORS[i].name,
            desc: "Vendor portal for personal carving queue",
            tabs: ["carving"]
          };
        }
      }
      return PORTALS[0];
    }

    function getVendorByPortal(id) {
      var i;
      for (i = 0; i < ALL_VENDORS.length; i++) {
        if (ALL_VENDORS[i].portal === id) return ALL_VENDORS[i];
      }
      return null;
    }

    function mk(field, value) {
      var out = {};
      out[field] = value;
      return out;
    }

    function toNum(value, fallback) {
      var n = parseFloat(value);
      return isNaN(n) ? fallback : n;
    }

    function round2(n) {
      return Math.round(n * 100) / 100;
    }

    function safeClone(obj) {
      try {
        return JSON.parse(JSON.stringify(obj));
      } catch (e) {
        return obj;
      }
    }

    function sclr(id) {
      if (!id || typeof id !== "string") return DEFAULT_COLOR;
      var num = parseInt(id.replace(/\D/g, ""), 10);
      if (!num || isNaN(num)) return DEFAULT_COLOR;
      return SLAB_COLORS[(num - 1) % SLAB_COLORS.length];
    }

    function today() {
      return new Date().toLocaleDateString("en-IN", { day: "2-digit", month: "short", year: "numeric" });
    }

    function nowStamp() {
      return new Date().toISOString();
    }

    function getNextId(list, prefix, fallbackStart) {
      var max = fallbackStart || 0;
      var i;
      for (i = 0; i < list.length; i++) {
        if (!list[i] || !list[i].id || typeof list[i].id !== "string") continue;
        if (list[i].id.indexOf(prefix) !== 0) continue;
        var num = parseInt(list[i].id.replace(/\D/g, ""), 10);
        if (!isNaN(num) && num > max) max = num;
      }
      return max + 1;
    }

    function normalizeBlock(raw, idx) {
      var id = raw && raw.id ? String(raw.id) : "BLK-" + String(101 + idx);
      return {
        id: id,
        l: toNum(raw && raw.l, 6),
        w: toNum(raw && raw.w, 4),
        h: toNum(raw && raw.h, 2),
        stone: raw && raw.stone === "Pinkstone" ? "Pinkstone" : "Makrana",
        cat: raw && raw.cat === "Reused" ? "Reused" : "Fresh",
        yard: YARDS.indexOf(toNum(raw && raw.yard, 1)) >= 0 ? toNum(raw && raw.yard, 1) : 1,
        tL: toNum(raw && raw.tL, 0),
        tR: toNum(raw && raw.tR, 0),
        tT: toNum(raw && raw.tT, 0),
        tB: toNum(raw && raw.tB, 0),
        trim: !!(raw && raw.trim)
      };
    }

    function normalizeSlab(raw, idx) {
      var id = raw && raw.id ? String(raw.id) : "S" + String(201 + idx);
      return {
        id: id,
        sw: toNum(raw && raw.sw, 2),
        sh: toNum(raw && raw.sh, 1.5),
        sd: toNum(raw && raw.sd, 0.5),
        label: raw && raw.label ? String(raw.label) : "New slab",
        temple: raw && TEMPLES.indexOf(raw.temple) >= 0 ? raw.temple : "Umia Mata"
      };
    }

    function sanitizeStateBlockList(list) {
      var src = Array.isArray(list) ? list : [];
      var out = [];
      var i;
      for (i = 0; i < src.length; i++) {
        if (!src[i] || !src[i].id) continue;
        out.push(normalizeBlock(src[i], i));
      }
      return out;
    }

    function sanitizeStateSlabList(list) {
      var src = Array.isArray(list) ? list : [];
      var out = [];
      var i;
      for (i = 0; i < src.length; i++) {
        if (!src[i] || !src[i].id) continue;
        out.push(normalizeSlab(src[i], i));
      }
      return out;
    }

    function sanitizeSessionBlock(raw) {
      if (!raw || !raw.blkId) return null;
      var placed = Array.isArray(raw.placed) ? raw.placed.filter(function (pl) {
        return pl && pl.id && typeof pl.px !== "undefined";
      }) : [];
      var slabs = Array.isArray(raw.slabs) ? raw.slabs.filter(function (sl) {
        return sl && sl.id;
      }) : [];
      return {
        blkId: String(raw.blkId),
        blk: raw.blk ? normalizeBlock(raw.blk, 0) : normalizeBlock(raw, 0),
        placed: placed,
        slabs: slabs,
        status: raw.status || "pending_worker",
        restocked: !!raw.restocked,
        reused: Array.isArray(raw.reused) ? raw.reused : [],
        stone: raw.stone || (raw.blk && raw.blk.stone) || "Makrana",
        l: toNum(raw.l || (raw.blk && raw.blk.l), 1),
        w: toNum(raw.w || (raw.blk && raw.blk.w), 1),
        h: toNum(raw.h || (raw.blk && raw.blk.h), 1),
        yard: toNum(raw.yard || (raw.blk && raw.blk.yard), 1),
        tL: toNum(raw.tL, 0),
        tT: toNum(raw.tT, 0),
        ua: toNum(raw.ua, 0),
        ka: toNum(raw.ka, 0),
        ba: toNum(raw.ba, 0),
        eff: toNum(raw.eff, 0),
        spaces: Array.isArray(raw.spaces) ? raw.spaces : []
      };
    }

    function sanitizeSessions(list) {
      var src = Array.isArray(list) ? list : [];
      var out = [];
      var i;
      var j;
      for (i = 0; i < src.length; i++) {
        if (!src[i] || !src[i].id) continue;
        var blocks = [];
        var rawBlocks = Array.isArray(src[i].blocks) ? src[i].blocks : [];
        for (j = 0; j < rawBlocks.length; j++) {
          var sb = sanitizeSessionBlock(rawBlocks[j]);
          if (sb) blocks.push(sb);
        }
        out.push({
          id: String(src[i].id),
          date: src[i].date || today(),
          kerf: toNum(src[i].kerf, 4),
          blocks: blocks
        });
      }
      return out;
    }

    function sanitizeCarvingItems(list) {
      var src = Array.isArray(list) ? list : [];
      var out = [];
      var i;
      for (i = 0; i < src.length; i++) {
        if (!src[i] || !src[i].id) continue;
        out.push({
          id: String(src[i].id),
          sw: toNum(src[i].sw, 1),
          sh: toNum(src[i].sh, 1),
          sd: toNum(src[i].sd, 0.5),
          label: src[i].label || "",
          temple: src[i].temple || "",
          vendorId: src[i].vendorId || "",
          vendorName: src[i].vendorName || "",
          vendorType: src[i].vendorType || "",
          note: src[i].note || "",
          fromBlock: src[i].fromBlock || "",
          stone: src[i].stone || "Makrana",
          yard: toNum(src[i].yard, 1),
          cutDate: src[i].cutDate || "",
          assignedDate: src[i].assignedDate || "",
          status: src[i].status || "not_started",
          px: toNum(src[i].px, 0),
          py: toNum(src[i].py, 0),
          pw: toNum(src[i].pw || src[i].sw, 1),
          ph: toNum(src[i].ph || src[i].sh, 1),
          rot: !!src[i].rot
        });
      }
      return out;
    }

    function lsGet(key, fallback) {
      try {
        var value = localStorage.getItem("mc_" + key);
        if (!value) return fallback;
        return JSON.parse(value);
      } catch (e) {
        return fallback;
      }
    }

    function lsSet(key, value) {
      try {
        localStorage.setItem("mc_" + key, JSON.stringify(value));
      } catch (e) {}
    }

    function clearLegacyData() {
      var version = lsGet("schema_version", 0);
      if (version === STORAGE_VERSION) return;
      var blocks = sanitizeStateBlockList(lsGet("blocks", DEFAULT_BLOCKS));
      var slabs = sanitizeStateSlabList(lsGet("slabs", DEFAULT_SLABS));
      var sessions = sanitizeSessions(lsGet("sessions", []));
      var carvingQ = sanitizeCarvingItems(lsGet("carvingQ", []));
      var carving = sanitizeCarvingItems(lsGet("carving", []));
      var completed = sanitizeCarvingItems(lsGet("completed", []));
      lsSet("blocks", blocks);
      lsSet("slabs", slabs);
      lsSet("sessions", sessions);
      lsSet("carvingQ", carvingQ);
      lsSet("carving", carving);
      lsSet("completed", completed);
      lsSet("schema_version", STORAGE_VERSION);
    }

    function totalUsableArea(blocks) {
      var sum = 0;
      var i;
      for (i = 0; i < blocks.length; i++) {
        if (!blocks[i] || !blocks[i].id) continue;
        var l = Math.max(0, toNum(blocks[i].l, 0) - toNum(blocks[i].tL, 0) - toNum(blocks[i].tR, 0));
        var w = Math.max(0, toNum(blocks[i].w, 0) - toNum(blocks[i].tT, 0) - toNum(blocks[i].tB, 0));
        sum += l * w;
      }
      return sum;
    }

    function totalRequiredArea(slabs) {
      var sum = 0;
      var i;
      for (i = 0; i < slabs.length; i++) {
        if (!slabs[i] || !slabs[i].id) continue;
        sum += toNum(slabs[i].sw, 0) * toNum(slabs[i].sh, 0);
      }
      return sum;
    }

    function sortByArea(items) {
      return items.slice().sort(function (a, b) {
        var areaA = toNum(a.w, 0) * toNum(a.h, 0);
        var areaB = toNum(b.w, 0) * toNum(b.h, 0);
        return areaB - areaA;
      });
    }

    function chooseSplit(space, aw, ah) {
      var opt1A = { x: space.x + aw, y: space.y, w: space.w - aw, h: ah };
      var opt1B = { x: space.x, y: space.y + ah, w: space.w, h: space.h - ah };
      var opt2A = { x: space.x, y: space.y + ah, w: aw, h: space.h - ah };
      var opt2B = { x: space.x + aw, y: space.y, w: space.w - aw, h: space.h };
      var big1 = Math.max(Math.max(0, opt1A.w) * Math.max(0, opt1A.h), Math.max(0, opt1B.w) * Math.max(0, opt1B.h));
      var big2 = Math.max(Math.max(0, opt2A.w) * Math.max(0, opt2A.h), Math.max(0, opt2B.w) * Math.max(0, opt2B.h));
      if (big1 >= big2) return [opt1A, opt1B];
      return [opt2A, opt2B];
    }

    function pruneSpaces(spaces) {
      var out = [];
      var i;
      for (i = 0; i < spaces.length; i++) {
        if (spaces[i] && spaces[i].w > 0.01 && spaces[i].h > 0.01) out.push(spaces[i]);
      }
      out.sort(function (a, b) {
        return (b.w * b.h) - (a.w * a.h);
      });
      return out;
    }

    function packBlock(W, H, items, kerfFt) {
      var spaces = [{ x: 0, y: 0, w: W, h: H }];
      var placed = [];
      var unplaced = [];
      var sorted = sortByArea(items);
      var i;
      var j;
      for (i = 0; i < sorted.length; i++) {
        var it = sorted[i];
        if (!it || !it.id) continue;
        var best = null;
        for (j = 0; j < spaces.length; j++) {
          var sp = spaces[j];
          var options = [
            { rot: false, aw: toNum(it.w, 0) + kerfFt, ah: toNum(it.h, 0) + kerfFt, pw: toNum(it.w, 0), ph: toNum(it.h, 0) },
            { rot: true, aw: toNum(it.h, 0) + kerfFt, ah: toNum(it.w, 0) + kerfFt, pw: toNum(it.h, 0), ph: toNum(it.w, 0) }
          ];
          var k;
          for (k = 0; k < options.length; k++) {
            var op = options[k];
            if (op.aw <= sp.w + 0.0001 && op.ah <= sp.h + 0.0001) {
              var waste = (sp.w * sp.h) - (op.aw * op.ah);
              if (!best || waste < best.waste || (waste === best.waste && (sp.w * sp.h) < best.spaceArea)) {
                best = {
                  spaceIndex: j,
                  rot: op.rot,
                  aw: op.aw,
                  ah: op.ah,
                  pw: op.pw,
                  ph: op.ph,
                  waste: waste,
                  spaceArea: sp.w * sp.h
                };
              }
            }
          }
        }
        if (!best) {
          unplaced.push(it);
        } else {
          var space = spaces[best.spaceIndex];
          placed.push({
            id: it.id,
            sw: it.sw,
            sh: it.sh,
            sd: it.sd,
            label: it.label,
            temple: it.temple,
            px: round2(space.x),
            py: round2(space.y),
            pw: round2(best.pw),
            ph: round2(best.ph),
            rot: best.rot,
            aw: round2(best.aw),
            ah: round2(best.ah)
          });
          spaces.splice(best.spaceIndex, 1);
          var newSpaces = chooseSplit(space, best.aw, best.ah);
          spaces = pruneSpaces(spaces.concat(newSpaces));
        }
      }
      return {
        placed: placed,
        spaces: spaces,
        unplaced: unplaced
      };
    }

    function runOptimization(blocks, slabs, kerfMm) {
      var kerfFt = toNum(kerfMm, 4) / 304.8;
      var remaining = sanitizeStateSlabList(slabs).map(function (sl) {
        return {
          id: sl.id,
          sw: sl.sw,
          sh: sl.sh,
          sd: sl.sd,
          label: sl.label,
          temple: sl.temple,
          w: sl.sw,
          h: sl.sh
        };
      });
      remaining = sortByArea(remaining);
      var plan = [];
      var i;
      for (i = 0; i < blocks.length; i++) {
        var blk = blocks[i];
        if (!blk || !blk.id || !remaining.length) continue;
        var usableL = Math.max(0, toNum(blk.l, 0) - toNum(blk.tL, 0) - toNum(blk.tR, 0));
        var usableW = Math.max(0, toNum(blk.w, 0) - toNum(blk.tT, 0) - toNum(blk.tB, 0));
        if (usableL <= 0.01 || usableW <= 0.01) continue;
        var packed = packBlock(usableL, usableW, remaining, kerfFt);
        if (!packed.placed.length) continue;
        var usedMap = {};
        var placedArea = 0;
        var kerfWaste = 0;
        var j;
        for (j = 0; j < packed.placed.length; j++) {
          usedMap[packed.placed[j].id] = true;
          placedArea += packed.placed[j].pw * packed.placed[j].ph;
          kerfWaste += (packed.placed[j].aw * packed.placed[j].ah) - (packed.placed[j].pw * packed.placed[j].ph);
        }
        var baseArea = usableL * usableW;
        var biggest = null;
        for (j = 0; j < packed.spaces.length; j++) {
          if (!biggest || (packed.spaces[j].w * packed.spaces[j].h) > (biggest.w * biggest.h)) biggest = packed.spaces[j];
        }
        plan.push({
          blk: normalizeBlock(blk, i),
          placed: packed.placed,
          spaces: packed.spaces,
          ua: round2(placedArea),
          ka: round2(kerfWaste),
          ba: round2(baseArea),
          eff: Math.round((placedArea / baseArea) * 100),
          eL: round2(usableL),
          eW: round2(usableW),
          tL: toNum(blk.tL, 0),
          tT: toNum(blk.tT, 0),
          biggest: biggest ? { l: round2(biggest.w), w: round2(biggest.h), h: toNum(blk.h, 0) } : null
        });
        remaining = remaining.filter(function (sl) {
          return !usedMap[sl.id];
        });
      }
      return {
        plan: plan,
        unmet: remaining,
        kerfFt: kerfFt,
        totalWaste: round2(plan.reduce(function (sum, p) {
          return sum + Math.max(0, p.ba - p.ua);
        }, 0))
      };
    }

    function isoProject(x, y, z, scale, offsetX, offsetY) {
      var C = Math.cos(Math.PI / 6);
      var S = 0.5;
      return {
        x: offsetX + (x - y) * C * scale,
        y: offsetY + (x + y) * S * scale - z * scale
      };
    }

    function renderPoint(p) {
      return p.x.toFixed(1) + "," + p.y.toFixed(1);
    }

    function IsoBlock(props) {

      var L = Math.max(0.1, toNum(blk.l, 1));
      var W = Math.max(0.1, toNum(blk.w, 1));
      var H = Math.max(0.1, toNum(blk.h, 1));
      var mini = !!props.mini;
      var targetW = mini ? 90 : 340;
      var targetH = mini ? 62 : 190;
      var C = Math.cos(Math.PI / 6);
      var S = 0.5;
      var scale = Math.min(targetW / ((L + W) * C), targetH / (((L + W) * S) + H), mini ? 12 : 30);
      var offsetX = ((W) * C * scale) + 8;
      var offsetY = H * scale + 8;
      var pal = STONE_PALETTES[blk.stone] || STONE_PALETTES.Makrana;
      var pid = "trim_" + String(blk.id).replace(/\W/g, "") + "_" + String(placed.length);

      function pt(x, y, z) {
        return isoProject(x, y, z, scale, offsetX, offsetY);
      }

      var allPts = [
        pt(0, 0, 0), pt(L, 0, 0), pt(0, W, 0), pt(L, W, 0),
        pt(0, 0, H), pt(L, 0, H), pt(0, W, H), pt(L, W, H)

      var xs = allPts.map(function (p) { return p.x; });
      var ys = allPts.map(function (p) { return p.y; });
      var minX = Math.min.apply(null, xs) - 6;
      var minY = Math.min.apply(null, ys) - 6;
      var maxX = Math.max.apply(null, xs) + 6;
      var maxY = Math.max.apply(null, ys) + (mini ? 6 : 16);

      var viewH = maxY - minY;

      function ptn(x, y, z) {

        strokeWidth: "0.7"
      }));
      nodes.push(h("polygon", {
        key: "side",
        points: [ptn(L, 0, 0), ptn(L, W, 0), ptn(L, W, H), ptn(L, 0, H)].join(" "),
        fill: pal.side,
        stroke: "rgba(0,0,0,0.12)",
        strokeWidth: "0.7"
      }));
      nodes.push(h("polygon", {
        key: "top",
        points: [ptn(0, 0, H), ptn(L, 0, H), ptn(L, W, H), ptn(0, W, H)].join(" "),

        stroke: "rgba(0,0,0,0.15)",
        strokeWidth: "0.8"
      }));

      var tL = toNum(blk.tL, 0);

      if (tL > 0) {
        nodes.push(h("polygon", {

      if (tR > 0) {

        }));
      }
      if (tT > 0) {
        nodes.push(h("polygon", {
          key: "trim_t",
          points: [ptn(0, 0, H), ptn(L, 0, H), ptn(L, tT, H), ptn(0, tT, H)].join(" "),
          fill: "url(#" + pid + ")"
        }));
      }
      if (tB > 0) {
        nodes.push(h("polygon", {
          key: "trim_b",
          points: [ptn(0, W - tB, H), ptn(L, W - tB, H), ptn(L, W, H), ptn(0, W, H)].join(" "),
          fill: "url(#" + pid + ")"
        }));
      }

      placed.forEach(function (pl) {
        var ox = tL;
        var oy = tT;
        var fill = sclr(pl.id);
        var poly = [
          ptn(ox + pl.px, oy + pl.py, H),
          ptn(ox + pl.px + pl.pw, oy + pl.py, H),
          ptn(ox + pl.px + pl.pw, oy + pl.py + pl.ph, H),
          ptn(ox + pl.px, oy + pl.py + pl.ph, H)
        ].join(" ");
        nodes.push(h("polygon", {
          key: "sl_" + pl.id,
          points: poly,
          fill: fill,
          opacity: "0.86",
          stroke: "rgba(255,255,255,0.72)",
          strokeWidth: "0.8"
        }));
        if (!mini && Math.min(pl.pw, pl.ph) * scale > 16) {
          var center = textXY(ox + pl.px + (pl.pw / 2), oy + pl.py + (pl.ph / 2), H);
          nodes.push(h("text", {
            key: "txt_" + pl.id,
            x: center.x,
            y: center.y,
            textAnchor: "middle",
            dominantBaseline: "middle",
            fill: "#ffffff",

            fontFamily: "Courier New, monospace"
          }, pl.id));
        }
      });

      if (!mini) {
        var lx = textXY(L / 2, 0, 0);
        var wy = textXY(L, W / 2, 0);
        var hz = textXY(0, 0, H / 2);

        nodes.push(h("text", { key: "dim_w", x: wy.x + 12, y: wy.y, textAnchor: "start", fill: "#9c8a75", fontSize: "8", fontFamily: "Courier New, monospace" }, W + "ft"));
        nodes.push(h("text", { key: "dim_h", x: hz.x - 10, y: hz.y, textAnchor: "end", fill: "#9c8a75", fontSize: "8", fontFamily: "Courier New, monospace" }, H + "ft"));
      }

      return h("svg", {
        width: "100%",
        viewBox: "0 0 " + viewW.toFixed(1) + " " + viewH.toFixed(1),
        style: {
          display: "block",
          background: mini ? "transparent" : "#f9f5ee",
          borderRadius: mini ? "0" : "12px",
          border: mini ? "none" : "1px solid rgba(90,66,38,0.08)"

      }, nodes);

          h("div", { className: "metric", key: "d" }, [h("div", { className: "metric-label" }, "Dispatched total"), h("div", { className: "metric-value" }, props.completed.length)])
        ]),
        h("div", { className: "grid-2" }, [
          h("div", { key: "left" }, [
            h("div", { className: "card" }, [
              h("div", { className: "section-head" }, [
                h("div", null, [
                  h("h3", { className: "page-title", style: { fontSize: "18px", marginBottom: "4px" } }, "Stock Blocks"),
                  h("div", { className: "muted" }, "Current block inventory")
                ])
              ]),
              props.blocks.length ? props.blocks.map(function (blk) {
                return h("div", { className: "surface", key: blk.id }, [
                  h("div", { className: "row" }, [
                    h("div", { style: { width: "70px", flexShrink: 0 } }, h(IsoBlock, { blk: blk, mini: true })),
                    h("div", null, [
                      h("div", { style: { fontFamily: "Courier New, monospace", fontWeight: "700", fontSize: "12px" } }, blk.id),
                      h("div", { className: "muted small" }, blk.stone + " | " + blk.l + " x " + blk.w + " x " + blk.h + " ft | Yard " + blk.yard)
                    ])
                  ])
                ]);
              }) : h("div", { className: "empty" }, "No blocks in stock.")
            ]),
            props.slabs.length ? h("div", { className: "card" }, [
              h("h3", { className: "page-title", style: { fontSize: "18px" } }, "Pending Slab Requirements"),
              h("div", { className: "grid-auto" }, props.slabs.map(function (sl) {
                return h("div", { className: "surface", key: sl.id }, [
                  h(SlabShape, { slab: sl, mini: true }),
                  h("div", { style: { marginTop: "8px", fontFamily: "Courier New, monospace", fontWeight: "700", fontSize: "11px" } }, sl.id),
                  h("div", { className: "muted small" }, sl.temple)
                ]);
              }))
            ]) : null
          ]),
          h("div", { key: "right" }, [
            h("div", { className: "card" }, [
              h("h3", { className: "page-title", style: { fontSize: "18px" } }, "Carving by Vendor"),
              Object.keys(byVendor).length ? Object.keys(byVendor).map(function (vendorId) {
                var vendor = ALL_VENDORS.filter(function (v) { return v.id === vendorId; })[0];
                var items = byVendor[vendorId];
                var pending = items.filter(function (it) { return it.status === "not_started"; }).length;
                var active = items.filter(function (it) { return it.status === "in_progress"; }).length;
                var done = items.filter(function (it) { return it.status === "completed"; }).length;
                return h("div", { className: "surface", key: vendorId }, [
                  h("div", { className: "between" }, [
                    h("strong", null, vendor ? vendor.name : vendorId),
                    h("span", { className: "badge " + ((vendor && vendor.type === "CNC") ? "b-blue" : "b-orange") }, vendor ? vendor.type : "Vendor")
                  ]),
                  h("div", { className: "row", style: { marginTop: "8px" } }, [
                    pending ? h("span", { className: "badge b-stone" }, pending + " pending") : null,
                    active ? h("span", { className: "badge b-orange" }, active + " active") : null,
                    done ? h("span", { className: "badge b-green" }, done + " done") : null
                  ])
                ]);
              }) : h("div", { className: "empty" }, "No carving assignments yet."),
              props.carvingQ.length ? h("div", { className: "banner banner-warn", style: { marginTop: "10px" } }, props.carvingQ.length + " slabs still awaiting vendor assignment.") : null
            ]),
            h("div", { className: "card" }, [
              h("h3", { className: "page-title", style: { fontSize: "18px" } }, "Completed Slabs"),
              props.completed.length ? h("table", { className: "table" }, [
                h("thead", null, h("tr", null, [
                  h("th", { key: "1" }, "ID"),
                  h("th", { key: "2" }, "Label"),
                  h("th", { key: "3" }, "Temple"),
                  h("th", { key: "4" }, "Vendor"),
                  h("th", { key: "5" }, "Dispatch")
                ])),
                h("tbody", null, props.completed.slice().reverse().map(function (item) {
                  return h("tr", { key: item.id + "_" + item.dispatchDate }, [
                    h("td", { key: "i" }, h("strong", { style: { fontFamily: "Courier New, monospace" } }, item.id)),
                    h("td", { key: "l" }, item.label),
                    h("td", { key: "t" }, item.temple),
                    h("td", { key: "v" }, item.vendorName),
                    h("td", { key: "d" }, item.dispatchDate)
                  ]);
                }))
              ]) : h("div", { className: "empty" }, "Nothing dispatched yet.")
            ])
          ])
        ])
      ]);
    }

    var DEFAULT_BLOCKS = [
      { id: "BLK-011", l: 8, w: 4, h: 2, stone: "Makrana", cat: "Fresh", yard: 1, tL: 0, tR: 0, tT: 0, tB: 0, trim: false },
      { id: "BLK-012", l: 7, w: 5, h: 2.5, stone: "Makrana", cat: "Fresh", yard: 1, tL: 0.5, tR: 0, tT: 0.3, tB: 0, trim: true },
      { id: "BLK-013", l: 9, w: 4, h: 2, stone: "Pinkstone", cat: "Fresh", yard: 2, tL: 0, tR: 0, tT: 0, tB: 0, trim: false },
      { id: "BLK-014", l: 6, w: 6, h: 1.5, stone: "Pinkstone", cat: "Fresh", yard: 2, tL: 0, tR: 0.5, tT: 0, tB: 0.4, trim: true }
    ];

    var DEFAULT_SLABS = [
      { id: "S201", sw: 3, sh: 2, sd: 0.5, label: "Entrance step", temple: "Umia Mata" },
      { id: "S202", sw: 4, sh: 2.5, sd: 0.75, label: "Main panel", temple: "Umia Mata" },
      { id: "S203", sw: 2.5, sh: 2.5, sd: 0.5, label: "Pillar face", temple: "Agroha Dham" },
      { id: "S204", sw: 2, sh: 1.5, sd: 0.5, label: "Niche slab", temple: "Agroha Dham" },
      { id: "S205", sw: 3.5, sh: 3, sd: 1, label: "Shrine floor", temple: "Balaknath" },
      { id: "S206", sw: 2.5, sh: 2, sd: 0.5, label: "Side wall", temple: "Balaknath" },
      { id: "S207", sw: 1.5, sh: 1.5, sd: 0.25, label: "Decor border", temple: "Umia Mata" },
      { id: "S208", sw: 3, sh: 2.5, sd: 0.75, label: "Ceiling piece", temple: "Umia Mata" },
      { id: "S209", sw: 2, sh: 2, sd: 0.5, label: "Corner panel", temple: "Agroha Dham" }
    ];

    clearLegacyData();

    function App() {
      var storedPortal = lsGet("active_portal", "");
      var ps = useState(storedPortal || "");
      var portal = ps[0];
      var setPortal = ps[1];

      var blocksState = useState(function () { return sanitizeStateBlockList(lsGet("blocks", DEFAULT_BLOCKS)); });
      var slabsState = useState(function () { return sanitizeStateSlabList(lsGet("slabs", DEFAULT_SLABS)); });
      var kerfState = useState(function () { return toNum(lsGet("kerf", 4), 4); });
      var pageState = useState("inventory");
      var planState = useState(null);
      var sessionsState = useState(function () { return sanitizeSessions(lsGet("sessions", [])); });
      var carvingQState = useState(function () { return sanitizeCarvingItems(lsGet("carvingQ", [])); });
      var carvingState = useState(function () { return sanitizeCarvingItems(lsGet("carving", [])); });
      var completedState = useState(function () { return sanitizeCarvingItems(lsGet("completed", [])); });
      var assignDraftState = useState({});

      var blocks = blocksState[0];
      var setBlocks = blocksState[1];
      var slabs = slabsState[0];
      var setSlabs = slabsState[1];
      var kerf = kerfState[0];
      var setKerf = kerfState[1];
      var page = pageState[0];
      var setPage = pageState[1];
      var planResult = planState[0];
      var setPlanResult = planState[1];
      var sessions = sessionsState[0];
      var setSessions = sessionsState[1];
      var carvingQ = carvingQState[0];
      var setCarvingQ = carvingQState[1];
      var carving = carvingState[0];
      var setCarving = carvingState[1];
      var completed = completedState[0];
      var setCompleted = completedState[1];
      var assignmentDraft = assignDraftState[0];
      var setAssignmentDraft = assignDraftState[1];

      useEffect(function () { lsSet("blocks", sanitizeStateBlockList(blocks)); }, [blocks]);
      useEffect(function () { lsSet("slabs", sanitizeStateSlabList(slabs)); }, [slabs]);
      useEffect(function () { lsSet("kerf", kerf); }, [kerf]);
      useEffect(function () { lsSet("sessions", sanitizeSessions(sessions)); }, [sessions]);
      useEffect(function () { lsSet("carvingQ", sanitizeCarvingItems(carvingQ)); }, [carvingQ]);
      useEffect(function () { lsSet("carving", sanitizeCarvingItems(carving)); }, [carving]);
      useEffect(function () { lsSet("completed", sanitizeCarvingItems(completed)); }, [completed]);
      useEffect(function () { lsSet("active_portal", portal || ""); }, [portal]);

      useEffect(function () {
        var meta = document.getElementById("head-meta");
        if (!meta) return;
        var vendor = getVendorByPortal(portal);
        var portalDef = getPortalDef(portal || "owner");
        var label = vendor ? vendor.name : portalDef.label;
        meta.innerHTML = portal ? '<span class="pill">Portal: ' + label + "</span><span class=\"pill\">Local browser mode</span>" : '<span class="pill">Choose portal below</span>';
      }, [portal]);

      function loginAs(nextPortal) {
        var portalDef = getPortalDef(nextPortal);
        setPortal(nextPortal);
        setPlanResult(null);
        setPage(portalDef.tabs[0] || "inventory");
      }

      function logout() {
        setPortal("");
        setPlanResult(null);
        setPage("inventory");
      }

      function allowedTabs() {
        var portalDef = getPortalDef(portal || "owner");
        return portalDef.tabs || [];
      }

      function isTabAllowed(tab) {
        return allowedTabs().indexOf(tab) >= 0;
      }

      function goSafe(tab) {
        if (isTabAllowed(tab)) setPage(tab);
      }

      function generatePlan() {
        var result = runOptimization(blocks, slabs, kerf);
        setPlanResult(result);
        setPage("plan");
      }

      function approvePlan() {
        if (!planResult || !planResult.plan) return;
        var usedBlockIds = {};
        var usedSlabIds = {};
        planResult.plan.forEach(function (entry) {
          if (!entry || !entry.blk || !entry.blk.id) return;
          usedBlockIds[entry.blk.id] = true;
          entry.placed.forEach(function (pl) {
            if (pl && pl.id) usedSlabIds[pl.id] = true;
          });
        });
        var currentSlabs = safeClone(slabs);
        var nextSessionNum = getNextId(sessions, "CUT-", 300);
        var newSession = {
          id: "CUT-" + String(nextSessionNum).padStart(3, "0"),
          date: today(),
          kerf: kerf,
          blocks: planResult.plan.map(function (entry) {
            var pickedSlabs = entry.placed.map(function (pl) {
              var i;
              for (i = 0; i < currentSlabs.length; i++) {
                if (currentSlabs[i] && currentSlabs[i].id === pl.id) {
                  return Object.assign({}, currentSlabs[i], pl, {
                    stone: entry.blk.stone
                  });
                }
              }
              return Object.assign({}, pl, { stone: entry.blk.stone });
            });
            return {
              blkId: entry.blk.id,
              blk: entry.blk,
              placed: entry.placed.filter(function (pl) { return pl && pl.id && typeof pl.px !== "undefined"; }),
              slabs: pickedSlabs.filter(function (sl) { return sl && sl.id; }),
              status: "pending_worker",
              restocked: false,
              reused: entry.biggest ? [{
                blkId: entry.blk.id,
                l: entry.biggest.l,
                w: entry.biggest.w,
                h: entry.biggest.h,
                stone: entry.blk.stone,
                yard: entry.blk.yard
              }] : [],
              stone: entry.blk.stone,
              l: entry.blk.l,
              w: entry.blk.w,
              h: entry.blk.h,
              yard: entry.blk.yard,
              tL: entry.tL,
              tT: entry.tT,
              ua: entry.ua,
              ka: entry.ka,
              ba: entry.ba,
              eff: entry.eff,
              spaces: entry.spaces || []
            };
          })
        };

        setBlocks(function (prev) {
          return prev.filter(function (blk) {
            return blk && blk.id && !usedBlockIds[blk.id];
          });
        });
        setSlabs(function (prev) {
          return prev.filter(function (sl) {
            return sl && sl.id && !usedSlabIds[sl.id];
          });
        });
        setSessions(function (prev) {
          return prev.concat([newSession]);
        });
        setPlanResult(null);
        setPage("cutting");
      }

      function denyPlan() {
        setPlanResult(null);
        setPage("inventory");
      }

      function setBlockStatus(sessionId, blockId, status) {
        setSessions(function (prev) {
          return prev.map(function (ses) {
            if (ses.id !== sessionId) return ses;
            return Object.assign({}, ses, {
              blocks: ses.blocks.map(function (blk) {
                if (blk.blkId !== blockId) return blk;
                return Object.assign({}, blk, { status: status });
              })
            });
          });
        });
      }

      function handleBlockDone(sessionId, blockId, restock) {
        var session = sessions.filter(function (s) { return s.id === sessionId; })[0];
        if (!session) return;
        var block = session.blocks.filter(function (b) { return b.blkId === blockId; })[0];
        if (!block) return;
        var newQueueItems = (block.slabs || []).filter(function (sl) {
          return sl && sl.id;
        }).map(function (sl) {
          return Object.assign({}, sl, {
            fromBlock: blockId,
            stone: block.stone,
            yard: block.yard,
            cutDate: today(),
            assignedDate: "",
            status: "not_started"
          });
        });
        setCarvingQ(function (prev) {
          return prev.concat(newQueueItems);
        });
        if (restock && block.reused && block.reused.length) {
          var remainder = block.reused[0];
          setBlocks(function (prev) {
            var newId = blockId + "-R-" + String(prev.length + 1);
            return prev.concat([normalizeBlock({
              id: newId,
              l: remainder.l,
              w: remainder.w,
              h: block.h,
              stone: block.stone,
              cat: "Reused",
              yard: block.yard,
              tL: 0,
              tR: 0,
              tT: 0,
              tB: 0,
              trim: false
            }, prev.length)]);
          });
        }
        setSessions(function (prev) {
          return prev.map(function (ses) {
            if (ses.id !== sessionId) return ses;
            return Object.assign({}, ses, {
              blocks: ses.blocks.map(function (blk) {
                if (blk.blkId !== blockId) return blk;
                return Object.assign({}, blk, { status: "done", restocked: restock });
              })
            });
          });
        });
      }

      function handleBlockReject(sessionId, blockId) {
        var session = sessions.filter(function (s) { return s.id === sessionId; })[0];
        if (!session) return;
        var block = session.blocks.filter(function (b) { return b.blkId === blockId; })[0];
        if (!block) return;
        setBlocks(function (prev) {
          return prev.concat([normalizeBlock(block.blk, prev.length)]);
        });
        setSlabs(function (prev) {
          var returned = (block.slabs || []).filter(function (sl) {
            return sl && sl.id;
          }).map(function (sl, idx) {
            return normalizeSlab({
              id: sl.id,
              sw: sl.sw,
              sh: sl.sh,
              sd: sl.sd,
              label: sl.label,
              temple: sl.temple
            }, prev.length + idx);
          });
          return prev.concat(returned);
        });
        setSessions(function (prev) {
          return prev.map(function (ses) {
            if (ses.id !== sessionId) return ses;
            return Object.assign({}, ses, {
              blocks: ses.blocks.map(function (blk) {
                if (blk.blkId !== blockId) return blk;
                return Object.assign({}, blk, { status: "rejected" });
              })
            });
          });
        });
      }

      function setAssignDraft(id, field, value) {
        setAssignmentDraft(function (prev) {
          var next = Object.assign({}, prev);
          next[id] = Object.assign({}, next[id] || {}, mk(field, value));
          return next;
        });
      }

      function assignToVendor(slab, vendorId, note) {
        var vendor = ALL_VENDORS.filter(function (v) { return v.id === vendorId; })[0];
        if (!vendor) return;
        setCarvingQ(function (prev) {
          return prev.filter(function (item) { return item.id !== slab.id; });
        });
        setCarving(function (prev) {
          return prev.concat([Object.assign({}, slab, {
            vendorId: vendor.id,
            vendorName: vendor.name,
            vendorType: vendor.type,
            note: note || "",
            assignedDate: today(),
            status: "not_started"
          })]);
        });
        setAssignmentDraft(function (prev) {
          var next = Object.assign({}, prev);
          delete next[slab.id];
          return next;
        });
      }

      function setCarvingStatus(id, status) {
        setCarving(function (prev) {
          return prev.map(function (item) {
            if (item.id !== id) return item;
            return Object.assign({}, item, { status: status });
          });
        });
      }

      function dispatchSlab(slab) {
        setCarving(function (prev) {
          return prev.filter(function (item) { return item.id !== slab.id; });
        });
        setCompleted(function (prev) {
          return prev.concat([Object.assign({}, slab, { dispatchDate: today() })]);
        });
      }

      function resetAllData() {
        setBlocks(sanitizeStateBlockList(DEFAULT_BLOCKS));
        setSlabs(sanitizeStateSlabList(DEFAULT_SLABS));
        setKerf(4);
        setPlanResult(null);
        setSessions([]);
        setCarvingQ([]);
        setCarving([]);
        setCompleted([]);
        setAssignmentDraft({});
      }

      if (!portal) {
        var vendorCards = ALL_VENDORS.map(function (vendor) {
          return {
            id: vendor.portal,
            label: vendor.name,
            desc: "Vendor portal for " + vendor.type + " carving status updates"
          };
        });
        var selection = "";
        return h("div", { className: "login-wrap" }, h("div", { className: "login-shell" }, [
          h("h2", { className: "page-title" }, "Choose Portal"),
          h("div", { className: "muted", style: { lineHeight: 1.7 } },
            "This offline file supports separate views for different people. It is role-based UI separation inside one browser file. For real secure accounts across devices, the next step would be a server-backed app."
          ),
          h("div", { className: "portal-grid" }, PORTALS.concat(vendorCards).map(function (entry) {
            return h("button", {
              key: entry.id,
              className: "portal-card" + (selection === entry.id ? " active" : ""),
              onClick: function () { loginAs(entry.id); }
            }, [
              h("strong", { key: "t" }, entry.label),
              h("span", { key: "d" }, entry.desc)
            ]);
          })),
          h("div", { className: "split-actions", style: { marginTop: "22px", justifyContent: "space-between" } }, [
            h("div", { className: "muted", key: "left" }, "Current file mode: local browser storage only"),
            h("button", { className: "btn btn-light", key: "right", onClick: resetAllData }, "Reset Sample Data")
          ])
        ]));
      }

      var tabs = [
        { id: "inventory", label: "Block Input", badge: 0, disabled: false },
        { id: "plan", label: "3D Cut Plan", badge: 0, disabled: !planResult },
        { id: "cutting", label: "Cutting", badge: sessions.reduce(function (sum, ses) {
          return sum + ses.blocks.filter(function (blk) {
            return blk.status !== "done" && blk.status !== "rejected";
          }).length;
        }, 0), disabled: false },
        { id: "carving_assign", label: "Carving Assign", badge: carvingQ.length, disabled: false },
        { id: "carving", label: "Carving", badge: carving.length, disabled: false },
        { id: "dashboard", label: "Dashboard", badge: 0, disabled: false }
      ].filter(function (tab) {
        return isTabAllowed(tab.id);
      });

      if (!isTabAllowed(page)) {
        setPage(tabs[0] ? tabs[0].id : "inventory");
        return null;
      }

      var portalDef = getPortalDef(portal);
      var vendorPortal = getVendorByPortal(portal);
      var canDispatch = portal === "owner" || portal === "dispatch";

      return h("div", null, [
        h("div", { className: "toolbar print-hide", key: "toolbar" }, [
          tabs.map(function (tab) {
            return h("button", {
              key: tab.id,
              className: "tab-btn" + (page === tab.id ? " active" : ""),
              disabled: tab.disabled,
              onClick: function () { goSafe(tab.id); }
            }, [
              h("span", { key: "txt" }, tab.label),
              tab.badge ? h("span", { key: "b", className: "badge b-stone" }, tab.badge) : null
            ]);
          }),
          h("div", { className: "role-strip", key: "meta" }, [
            h("span", { className: "badge b-stone", key: "role" }, "Portal: " + (vendorPortal ? vendorPortal.name : portalDef.label)),
            h("button", { className: "btn btn-light", key: "switch", onClick: logout }, "Switch Portal"),
            portal === "owner" ? h("button", { className: "btn btn-light", key: "reset", onClick: resetAllData }, "Reset Data") : null
          ])
        ]),
        page === "inventory" ? h(InventoryPage, {
          key: "inventory",
          blocks: blocks,
          slabs: slabs,
          setBlocks: setBlocks,
          setSlabs: setSlabs,
          kerf: kerf,
          setKerf: setKerf,
          onGenerate: generatePlan,
          portal: portal
        }) : null,
        page === "plan" ? h(PlanPage, {
          key: "plan",
          result: planResult,
          kerf: kerf,
          onApprove: approvePlan,
          onDeny: denyPlan
        }) : null,
        page === "cutting" ? h(CuttingPage, {
          key: "cutting",
          sessions: sessions,
          setBlockStatus: setBlockStatus,
          onDone: handleBlockDone,
          onReject: handleBlockReject
        }) : null,
        page === "carving_assign" ? h(CarvingAssignPage, {
          key: "carving_assign",
          queue: carvingQ,
          assignmentDraft: assignmentDraft,
          setDraft: setAssignDraft,
          onAssign: assignToVendor
        }) : null,
        page === "carving" ? h(CarvingPage, {
          key: "carving",
          carving: carving,
          setStatus: setCarvingStatus,
          onDispatch: dispatchSlab,
          canDispatch: canDispatch,
          portal: portal
        }) : null,
        page === "dashboard" ? h(DashboardPage, {
          key: "dashboard",
          blocks: blocks,
          slabs: slabs,
          sessions: sessions,
          carvingQ: carvingQ,
          carving: carving,
          completed: completed
        }) : null
      ]);
    }

    ReactDOM.createRoot(document.getElementById("app")).render(h(App));
  </script>
</body>
</html>
